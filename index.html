      background: #fafafa; border-right: 1px solid #e5e7eb;
      overflow-y: auto; padding: 16px 0;
    }
    .sidebar-category {
      padding: 6px 16px 2px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #6b7280; margin-top: 8px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;

    .sidebar-toggle {
      font-size: 14px;
      font-weight: 400;
      line-height: 1;
      color: #9ca3af;
    }
    .sidebar-method {

    }
    .sidebar-method:hover { color: #3f51b5; background: #eff6ff; }

    .mdn-link:hover { color: #3f51b5; text-decoration: underline; }

    .args-table {
      width: 100%; border-collapse: collapse;
      margin-bottom: 14px; font-size: 13px;
    }
    .args-table th {
      text-align: left; padding: 4px 8px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      color: #6b7280; font-weight: 600;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;

    .args-table td { padding: 5px 8px; border: 1px solid #e5e7eb; }
    .arg-type { font-family: monospace; color: #7c3aed; font-size: 12px; }

      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: #9ca3af; font-weight: 700; margin-bottom: 6px; margin-top: 14px;

    .returns-value { font-size: 13px; color: #374151; margin-bottom: 14px; }

      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: #6b7280; margin-bottom: 4px; font-weight: 600;

      background: #1e1e2e; color: #cdd6f4;
      border-radius: 6px; padding: 16px 20px;

    .str { color: #a6e3a1; }
    .num { color: #fab387; }
    .cm, .cm * { color: #6c7086; }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,255,255,0.1); border: none;
      color: #94a3b8; border-radius: 4px;

    // ── CodeBlock ─────────────────────────────────────────────────────────────
    const CodeBlock = defineComponent({
      props: {
        code:  { type: String, required: true },
        label: { type: String, required: true },
      },
      data() {
        return { copyLabel: 'Copy' };
      },
      computed: {
        highlighted() {
          let s = this.code.trim()
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
          // 1. Strings
          s = s.replace(/(`[^`]*`|'[^']*'|"[^"]*")/g, '<span class="str">$1</span>');
          // 2. Comments
          s = s.replace(/(\/\/.*$)/gm, '<span class="cm">$1</span>');
          // 3. Numbers
          s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
          // 4. Keywords
          s = s.replace(
            /\b(const|let|var|return|function|new|if|else|for|of|in|typeof)\b/g,
            '<span class="kw">$1</span>'
          );
          return s;
        },
      },
      methods: {
        copyCode() {
          navigator.clipboard.writeText(this.code).then(() => {
            this.copyLabel = 'Copied!';
            setTimeout(() => { this.copyLabel = 'Copy'; }, 1500);
          }).catch(() => {});
        },
      },
      template: `

          <pre class="code-pre"><button class="copy-btn" @click="copyCode">{{ copyLabel }}</button><span v-html="highlighted"></span></pre>

      props: {
        methods:     { type: Array,  required: true },

      },
      emits: ['update:activeMethodId'],
      setup(props, { emit }) {
        let observer = null;
        const mainRef = ref(null);

        function buildObserver(el) {
          if (observer) observer.disconnect();
          observer = new IntersectionObserver((entries) => {
            const visible = entries.filter(e => e.isIntersecting);
            if (!visible.length) return;

            const positive = visible.filter(e => e.boundingClientRect.top >= 0);
            const chosen = positive.length
              ? positive.reduce((a, b) => a.boundingClientRect.top <= b.boundingClientRect.top ? a : b)
              : visible.reduce((a, b) => a.boundingClientRect.top >= b.boundingClientRect.top ? a : b);

            emit('update:activeMethodId', chosen.target.dataset.methodId);
          }, { threshold: [0, 0.1, 0.3] });

          el.querySelectorAll('section[data-method-id]').forEach(sec => observer.observe(sec));
        }

        watch(() => props.methods, () => {
          nextTick(() => { if (mainRef.value) buildObserver(mainRef.value); });
        }, { flush: 'post' });

        onMounted(() => { if (mainRef.value) buildObserver(mainRef.value); });
        onUnmounted(() => { if (observer) observer.disconnect(); });

        return { mainRef };
      },

            type="search"
            placeholder="Search methods..."
            :value="modelValue"
            @input="$emit('update:modelValue', $event.target.value)"
          />
          <span class="version-badge">You Don't Need Lodash or Underscore.js</span>
        </header>
      `,
    });

    // ── Sidebar ───────────────────────────────────────────────────────────────
    const Sidebar = defineComponent({
      props: {
        methods:        { type: Array,  required: true },
        activeMethodId: { type: String, default: '' },
      },
      setup(props) {
        const collapsedCategories = ref(new Set());

        const categories = computed(() => {
          const order = ['Array','Collection','Function','Lang','Object','String'];
          const map = {};
          for (const m of props.methods) {
            if (!map[m.category]) map[m.category] = [];
            map[m.category].push(m);
          }
          return order.filter(cat => map[cat]).map(cat => ({ name: cat, methods: map[cat] }));
        });

        function toggleCategory(name) {
          const s = new Set(collapsedCategories.value);
          s.has(name) ? s.delete(name) : s.add(name);
          collapsedCategories.value = s;
        }

        return { categories, collapsedCategories, toggleCategory };
      },
      template: `
        <nav class="sidebar">
          <template v-for="cat in categories" :key="cat.name">
            <div class="sidebar-category" @click="toggleCategory(cat.name)">
              {{ cat.name }}
              <span class="sidebar-toggle">{{ collapsedCategories.has(cat.name) ? '+' : '−' }}</span>
            </div>
            <a
              v-for="m in cat.methods"
              v-show="!collapsedCategories.has(cat.name)"
              :key="m.id"
              :href="'#' + m.id"
              :class="['sidebar-method', { active: m.id === activeMethodId }]"
            >{{ m.name }}</a>
          </template>
        </nav>
      `,
    });

    // ── App root ──────────────────────────────────────────────────────────────
    const App = defineComponent({
      components: { TopBar, Sidebar, MethodList },
      setup() {
        const searchQuery    = ref('');
        const activeMethodId = ref('');

        const filteredMethods = computed(() => {
          const q = searchQuery.value.toLowerCase().trim();
          if (!q) return methods;
          return methods.filter(m =>
            m.id.toLowerCase().includes(q) ||
            m.name.toLowerCase().includes(q) ||
            m.category.toLowerCase() === q
          );
        });

        watch(filteredMethods, (list) => {
          if (!list.find(m => m.id === activeMethodId.value)) {
            activeMethodId.value = list[0]?.id ?? '';
          }
        });

        function syncFromHash() {
          const hash = window.location.hash.slice(1);
          if (hash && methods.find(m => m.id === hash)) {
            activeMethodId.value = hash;
          }
        }

        onMounted(() => {
          const hash = window.location.hash.slice(1);
          if (hash && methods.find(m => m.id === hash)) {
            activeMethodId.value = hash;
          } else {
            activeMethodId.value = methods[0]?.id ?? '';
          }
          window.addEventListener('hashchange', syncFromHash);
        });

        onUnmounted(() => {
          window.removeEventListener('hashchange', syncFromHash);
        });

        return { searchQuery, activeMethodId, filteredMethods };
      },
      template: `
        <TopBar v-model="searchQuery" />
        <div class="layout">
          <Sidebar
            :methods="filteredMethods"
            :activeMethodId="activeMethodId"
          />
          <div class="content-wrap">
            <MethodList
              :methods="filteredMethods"
              :searchQuery="searchQuery"
              @update:activeMethodId="activeMethodId = $event"
            />
            <footer>
              <span>Based on <a href="https://github.com/you-dont-need/You-Dont-Need-Lodash-Underscore" target="_blank">You Don't Need Lodash/Underscore</a></span>
              <span>Built with <a href="https://claude.ai/code" target="_blank">Claude Code</a></span>
            </footer>
          </div>
        </div>
      `,
    });

    createApp(App).mount('#app');

  </script>
</body>
</html>
